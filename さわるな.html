<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>元気？</title>
<style>
html,body{
  margin:0;
  width:100%;
  height:100%;
  background:#fff;
}
#start{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  cursor:pointer;
  user-select:none;
}
#msg{
  position:fixed;
  inset:0;
  pointer-events:none;
  align-items:center;
  justify-content:center;
  font-size:100px;
  color:#000;
}
</style>
</head>
<body>

<div id="start">押して起動</div>

<!--下のdivタグに文字入れるとオンライン時にわかる-->
<div id="msg" hidden>さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！さわるな！</div>

<audio id="sound"
  src="file:///media/fuse/drivefs-917c7a68fcdf2898c700b650ecedbea2/root/%E8%87%AA%E5%88%86%E3%83%95%E3%82%A1%E3%82%A4%E3%83%AB/hikakin/hi.mp3"
  loop>
</audio>

<script>
let armed=false;
let wentOffline=false;
let started=false;

const audio=document.getElementById("sound");
const msg=document.getElementById("msg");

function trigger(){
  if(started)return;
  started=true;
  msg.hidden=false;
  msg.style.display="flex";
  audio.play();
}

start.onclick=()=>{
  armed=true;
  start.style.display="none";
};

addEventListener("offline",()=>{
  if(armed) wentOffline=true;
});

addEventListener("online",()=>{
  if(armed && wentOffline){
    trigger();
  }
});
</script>
</body>
</html>
